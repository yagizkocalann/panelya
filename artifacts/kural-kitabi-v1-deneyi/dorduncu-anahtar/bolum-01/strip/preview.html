<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dördüncü Anahtar · Kural Kitabı v1 Deneyi</title>
  <style>
    * { box-sizing: border-box; }
    html { background: #151515; }
    body { width: min(690px, 100%); margin: 0 auto; color: #171717; background: #fff; font-family: Arial, "Helvetica Neue", sans-serif; }
    .title { min-height: 520px; padding: 64px 32px; display: grid; place-content: center; text-align: center; }
    .title small { color: #778079; letter-spacing: .18em; text-transform: uppercase; }
    .title h1 { margin: 14px 0 6px; font-size: clamp(42px, 11vw, 76px); font-weight: 500; letter-spacing: -.06em; }
    .title p { margin: 0; color: #7c817e; }
    .panel { position: relative; width: 100%; }
    .panel img { width: 100%; height: auto; display: block; }
    .panel--small { width: 62%; margin-left: auto; }
    .gap-normal { height: 120px; }
    .gap-scene { height: 360px; }
    .gap-dramatic { height: 580px; }
    .narrator, .bubble { position: absolute; z-index: 2; line-height: 1.35; }
    .narrator { top: 28px; left: 28px; padding: 12px 16px; border: 1px solid #aeb5b1; background: rgba(239,242,240,.94); font-size: 14px; letter-spacing: .06em; }
    .bubble { max-width: 230px; padding: 17px 20px; border: 1.5px solid #202020; border-radius: 50%; background: rgba(255,255,255,.96); font-size: 15px; font-weight: 750; text-align: center; }
    .bubble--mert { top: 42px; right: 30px; }
    .bubble--selin { top: 54px; right: 28px; min-width: 120px; }
    .bubble--thought { top: 150px; right: 32px; border-style: dashed; color: #5b5960; }
    .panel--small .bubble { top: 24px; right: 22px; max-width: 170px; font-size: 13px; }
    .end { min-height: 700px; padding-top: 430px; text-align: center; letter-spacing: .18em; font-size: 13px; }
    @media (max-width: 520px) {
      .panel--small { width: 78%; }
      .bubble { max-width: 180px; padding: 13px 15px; font-size: 12px; }
      .gap-normal { height: 90px; }
      .gap-scene { height: 280px; }
      .gap-dramatic { height: 430px; }
    }
  </style>
</head>
<body>
  <header class="title"><small>Kural kitabı v1 style-master</small><h1>Dördüncü Anahtar</h1><p>S01 · İlk karşılaşma</p></header>
  <div class="gap-scene" aria-hidden="true"></div>
  <figure class="panel"><img src="../panels/S01_P001-v1-clean.png" alt="Yağmurlu Galata pasajında uzaktan ilk kez karşılaşan Selin ve Mert."><figcaption class="narrator">ALTI SAAT ÖNCE.</figcaption></figure>
  <div class="gap-normal" aria-hidden="true"></div>
  <figure class="panel"><img src="../panels/S01_P002-v1-clean.png" alt="Mert'in ikinci pirinç anahtarı Selin'e gösterdiği omuz üstü plan."><figcaption class="bubble bubble--mert">SANIRIM AYNI KAPIYI ARIYORUZ.</figcaption></figure>
  <div class="gap-normal" aria-hidden="true"></div>
  <figure class="panel"><img src="../panels/S01_P003-v1-clean.png" alt="Aynı dişlere sahip iki pirinç anahtarın farklı ellerde yakın planı."></figure>
  <div class="gap-dramatic" aria-hidden="true"></div>
  <figure class="panel"><img src="../panels/S01_P004-v1-clean.png" alt="Selin'in kuşkudan meraka geçen yakın yüz planı."><figcaption class="bubble bubble--selin">TESADÜF.</figcaption><span class="bubble bubble--thought">HİÇ NORMAL DEĞİL.</span></figure>
  <div class="gap-normal" aria-hidden="true"></div>
  <figure class="panel panel--small"><img src="../panels/S01_P005-v2-clean.png" alt="Eski arşiv kutularının altında ezilirken sakin görünen chibi Selin."><figcaption class="bubble">ESKİ BİNA DETAYI.</figcaption></figure>
  <footer class="end">DEVAM EDECEK</footer>
</body>
</html>
