name: Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - codex/web
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  web-quality:
    name: Web quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v6

      - name: Node.js surumunu hazirla
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Bagimliliklari kilit dosyasindan kur
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build ve test
        run: npm test
