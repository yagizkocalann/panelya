name: Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - codex/web
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  web-quality:
    name: Web quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v6

      - name: Node.js surumunu hazirla
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Bagimliliklari kilit dosyasindan kur
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build ve test
        run: npm test

  mobile-quality:
    name: Mobile quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Kaynak kodu ve karsilastirma gecmisini al
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mobil kalite kapsamini belirle
        id: mobile-scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ ! -f apps/mobile/pubspec.yaml ]]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Mobil uygulama bu ref icinde henuz yok."
            exit 0
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            changed_files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          elif [[ -n "$BEFORE_SHA" && "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]]; then
            changed_files="$(git diff --name-only "$BEFORE_SHA" "$GITHUB_SHA")"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if printf '%s\n' "$changed_files" | grep -Eq '^(apps/mobile/|packages/contracts/|\.github/workflows/quality\.yml$)'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Mobil veya ortak sozlesme degisikligi yok."
          fi

      - name: Flutter 3.44.6 stable surumunu hazirla
        if: steps.mobile-scope.outputs.run == 'true'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true
          pub-cache: true

      - name: Flutter bagimliliklarini kilit dosyasindan kur
        if: steps.mobile-scope.outputs.run == 'true'
        working-directory: apps/mobile
        run: flutter pub get --enforce-lockfile

      - name: Flutter analyze
        if: steps.mobile-scope.outputs.run == 'true'
        working-directory: apps/mobile
        run: flutter analyze

      - name: Flutter test
        if: steps.mobile-scope.outputs.run == 'true'
        working-directory: apps/mobile
        run: flutter test
